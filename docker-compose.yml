services:
  # Backend (Laravel)
  app:
    image: ghcr.io/alfian-code/backend-wisma-amal:latest
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
    depends_on:
      - db
    networks:
      - app-network

  # Database (MariaDB)
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-wisma_amal}
      MARIADB_USER: ${DB_USERNAME:-root}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  # Web Server (Nginx)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - ./storage:/var/www/storage
    depends_on:
      - app
      - frontend
    networks:
      - app-network

  # Frontend (Flutter Web)
  frontend:
    image: ghcr.io/alfian-code/frontend-wisma-amal:latest
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
